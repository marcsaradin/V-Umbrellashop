<!DOCTYPE html>
<html>
<head>
<title>Shop</title>
</head>

<body>

<h1>🛒 Shop</h1>

<button onclick="buy()">Acheter item</button>

<script>
const API = "https://TON-BACKEND.up.railway.app";

const userId = prompt("Ton ID Discord");

async function buy() {
    const res = await fetch(API + "/buy", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            userId: userId,
            item: "Test Item",
            price: 100
        })
    });

    const data = await res.json();
    alert(JSON.stringify(data));
}
</script>

</body>
</html>
