<script>
const API = "https://v-umbrellashop-production.up.railway.app";

let userId = localStorage.getItem("userId");

if (!userId) {
    userId = prompt("Entre ton ID Discord");
    localStorage.setItem("userId", userId);
}

const coinsEl = document.getElementById("coins");

// 🔥 SOLDE
async function load() {
  const res = await fetch(`${API}/balance/${userId}`);
  const data = await res.json();
  coinsEl.innerText = data.ambre;
}

// 🔥 ACHAT
async function buy(name, price) {
  const res = await fetch(`${API}/buy`, {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({ userId, item:name, price })
  });

  const data = await res.json();

  if (data.error) return alert(data.error);

  coinsEl.innerText = data.newBalance;
  alert("Achat réussi");
}

load();
</script>
